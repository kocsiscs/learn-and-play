<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌟 Zente Tanulójátékok</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0e1a;
  --bg2: #1a1830;
  --card: #231f3a;
  --card2: #2d2848;
  --border: #3d3660;
  --jly: #fbbf24;
  --szo: #4ade80;
  --lila: #e879f9;
  --kek: #60a5fa;
  --text: #f0eeff;
  --muted: #9b8fc4;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  gap: 40px;
  overflow-x: hidden;
}

/* ===== STARS BG ===== */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 20%, #2d1b6940 0%, transparent 60%),
    radial-gradient(ellipse at 80% 80%, #1a1060 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* ===== HEADER ===== */
header {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  position: relative;
  z-index: 1;
}

.logo {
  font-family: 'Baloo 2', cursive;
  font-size: clamp(2.6rem, 9vw, 4.5rem);
  font-weight: 800;
  background: linear-gradient(135deg, #fbbf24, #e879f9, #4ade80);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-align: center;
  filter: drop-shadow(0 0 28px #e879f955);
  line-height: 1.1;
}

.logo-stars {
  font-size: clamp(1.8rem, 5vw, 2.8rem);
  filter: none;
  -webkit-text-fill-color: initial;
  background: none;
  margin-bottom: -6px;
}

.logo-sub {
  font-size: 1.1rem;
  color: var(--muted);
  font-weight: 700;
  text-align: center;
  letter-spacing: 0.03em;
}

/* ===== GAME CARDS GRID ===== */
.games-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
  width: 100%;
  max-width: 680px;
  position: relative;
  z-index: 1;
}

.game-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 24px;
  padding: 36px 28px;
  text-decoration: none;
  color: var(--text);
  transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.game-card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 22px;
  opacity: 0;
  transition: opacity 0.2s;
}

.game-card.helyesiras::before {
  background: radial-gradient(ellipse at 50% 0%, #e879f920 0%, transparent 70%);
}

.game-card.matek::before {
  background: radial-gradient(ellipse at 50% 0%, #fbbf2420 0%, transparent 70%);
}

.game-card:hover {
  transform: translateY(-6px) scale(1.02);
  box-shadow: 0 16px 48px #0008;
}

.game-card:hover::before { opacity: 1; }

.game-card.helyesiras:hover {
  border-color: #e879f9;
  box-shadow: 0 16px 48px #e879f930;
}

.game-card.matek:hover {
  border-color: #fbbf24;
  box-shadow: 0 16px 48px #fbbf2430;
}

.game-card:active {
  transform: translateY(-2px) scale(0.99);
}

.card-icon {
  font-size: 3.8rem;
  line-height: 1;
  filter: drop-shadow(0 0 16px #e879f988);
}

.game-card.matek .card-icon {
  filter: drop-shadow(0 0 16px #fbbf2488);
}

.card-title {
  font-family: 'Baloo 2', cursive;
  font-size: 1.7rem;
  font-weight: 800;
  text-align: center;
  line-height: 1.2;
}

.game-card.helyesiras .card-title {
  background: linear-gradient(135deg, #e879f9, #c084fc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.game-card.matek .card-title {
  background: linear-gradient(135deg, #fbbf24, #fb923c);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.card-desc {
  font-size: 0.97rem;
  color: var(--muted);
  text-align: center;
  font-weight: 600;
  line-height: 1.5;
}

.card-btn {
  margin-top: 6px;
  padding: 10px 28px;
  border-radius: 50px;
  font-family: 'Nunito', sans-serif;
  font-size: 1rem;
  font-weight: 800;
  border: none;
  cursor: pointer;
  transition: filter 0.15s, transform 0.15s;
  letter-spacing: 0.02em;
}

.game-card.helyesiras .card-btn {
  background: linear-gradient(135deg, #e879f9, #a855f7);
  color: #fff;
  box-shadow: 0 4px 18px #e879f955;
}

.game-card.matek .card-btn {
  background: linear-gradient(135deg, #fbbf24, #f97316);
  color: #1a1200;
  box-shadow: 0 4px 18px #fbbf2455;
}

.card-btn:hover {
  filter: brightness(1.12);
  transform: scale(1.04);
}

/* ===== FOOTER ===== */
footer {
  font-size: 0.88rem;
  color: var(--muted);
  font-weight: 700;
  text-align: center;
  position: relative;
  z-index: 1;
  opacity: 0.7;
}

/* ===== FLOATING STARS ===== */
.stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.star {
  position: absolute;
  border-radius: 50%;
  background: #fff;
  opacity: 0;
  animation: twinkle var(--d) ease-in-out var(--delay) infinite;
}
@keyframes twinkle {
  0%, 100% { opacity: 0; transform: scale(0.6); }
  50% { opacity: var(--op); transform: scale(1.1); }
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<header>
  <div class="logo">
    <span class="logo-stars">⭐</span><br>
    Zente Tanulójátékok
  </div>
  <div class="logo-sub">Válassz egy játékot és kezdjük el! 🚀</div>
</header>

<div class="games-grid">
  <a class="game-card helyesiras" href="helyesiras_varazs.html">
    <div class="card-icon">✨📝</div>
    <div class="card-title">Helyesírás Varázs</div>
    <div class="card-desc">Gyakorold a magyar helyesírást szórakoztatóan! Betűk, szavak, mondatok – minden szinten.</div>
    <button class="card-btn">Játék indítása →</button>
  </a>

  <a class="game-card matek" href="matek_varazs.html">
    <div class="card-icon">🌟🔢</div>
    <div class="card-title">Matek Varázs</div>
    <div class="card-desc">Összeadás, kivonás, szorzás, osztás – fejleszd a számolási készségedet játékosan!</div>
    <button class="card-btn">Játék indítása →</button>
  </a>
</div>

<footer>Zente tanulójátékok &nbsp;•&nbsp; 2025</footer>

<script>
// Generate twinkling stars
const starsEl = document.getElementById('stars');
for (let i = 0; i < 55; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2.5 + 1;
  s.style.cssText = `
    width:${size}px; height:${size}px;
    left:${Math.random()*100}%;
    top:${Math.random()*100}%;
    --d:${(Math.random()*4+2).toFixed(1)}s;
    --delay:${(Math.random()*5).toFixed(1)}s;
    --op:${(Math.random()*0.5+0.2).toFixed(2)};
  `;
  starsEl.appendChild(s);
}
</script>
</body>
</html>
